{% extends 'students/base.html' %}
{% block content %}
<h2>{% if object %}Edit{% else %}Create{% endif %} Event</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-success">Save</button>
  <a class="btn btn-secondary" href="{% url 'event_list' %}">Cancel</a>
</form>
{% endblock %}
