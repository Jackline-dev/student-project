{% extends 'students/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center">
  <h2>All Events</h2>
  <a class="btn btn-primary" href="{% url 'event_add' %}">Add Event</a>
</div>
<ul class="list-group mt-3">
  {% for event in events %}
    <li class="list-group-item">
      <a href="{% url 'event_detail' event.pk %}">{{ event.title }}</a>
      <div class="small text-muted">{{ event.category }} — {{ event.event_date }}</div>
    </li>
  {% empty %}
    <li class="list-group-item">No events yet</li>
  {% endfor %}
</ul>
{% endblock %}
