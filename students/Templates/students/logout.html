{% extends 'students/base.html' %}

{% block title %}Logged Out | Campus Events{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm border-0 p-5">
            <div class="mb-4">
                <i class="bi bi-door-open text-secondary display-1"></i>
            </div>
            <h2 class="fw-bold">You have logged out</h2>
            <p class="text-muted mb-4">Thank you for spending time with the Campus Events community today. We hope to see you again soon!</p>
            
            <div class="d-grid gap-2">
                <a href="{% url 'login' %}" class="btn btn-primary">Sign Back In</a>
                <a href="{% url 'index' %}" class="btn btn-outline-secondary">Return to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
